<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Stack Drop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #1f2225;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    color: #fff;
  }
  #game {
    position: relative;
    width: 420px;
    height: 760px;
    max-width: 100vw;
    max-height: 95vh;
    background: #2a2d31;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    cursor: pointer;
    touch-action: none;
  }
  #scene { position: absolute; inset: 0; }
  #scene canvas { display: block; width: 100% !important; height: 100% !important; }
  #water {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 160px; pointer-events: none; z-index: 4;
    background: linear-gradient(180deg, rgba(25,118,210,0) 0%, #1976d2 30%, #0d47a1 100%);
  }
  .wave {
    position: absolute; top: 0; left: 0;
    width: 200%; height: 28px;
    background-repeat: repeat-x;
    background-size: 200px 28px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 28' preserveAspectRatio='none'><path d='M0 14 Q 25 0 50 14 T 100 14 T 150 14 T 200 14 V28 H0 Z' fill='%231976d2'/></svg>");
  }
  .wave.back {
    top: 8px; opacity: 0.5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 28' preserveAspectRatio='none'><path d='M0 14 Q 25 28 50 14 T 100 14 T 150 14 T 200 14 V28 H0 Z' fill='%2342a5f5'/></svg>");
    animation: waveMove 6s linear infinite reverse;
  }
  .wave.front { animation: waveMove 3.5s linear infinite; }
  @keyframes waveMove {
    from { background-position: 0 0; }
    to { background-position: -200px 0; }
  }
  .hud-score {
    position: absolute; top: 14px; right: 16px; z-index: 10;
    display: flex; align-items: center; gap: 6px;
    font-size: 26px; font-weight: 800;
  }
  .hud-best {
    position: absolute; top: 18px; left: 16px; z-index: 10;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
  }
  #rocket {
    position: absolute; pointer-events: none; z-index: 5;
    transform: translate(-50%, -100%);
    transition: left 60ms linear, top 60ms linear;
  }
  #overlay {
    position: absolute; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 48px; font-weight: 800; }
  .stats { display: flex; gap: 32px; text-align: center; }
  .stats .lbl { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .6; }
  .stats .val { font-size: 28px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .btns { display: flex; gap: 12px; }
  button {
    border: none; cursor: pointer; font-weight: 700; font-size: 15px;
    padding: 12px 28px; border-radius: 999px; transition: transform .15s;
    font-family: inherit;
  }
  button:hover { transform: scale(1.05); }
  .btn-primary { background: #fff; color: #1f2225; }
  .btn-secondary { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
  .hint { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,0.5); }
  #handCanvas {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 15;
    background: rgba(0,0,0,0.7);
    display: none;
    width: 200px;
    height: 150px;
    border-radius: 10px;
  }
  .control-panel {
    position: fixed; top: 10px; left: 10px; z-index: 25;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .toggle-btn, .control-status {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    transition: background 0.2s;
  }
  .toggle-btn:hover {
    background: rgba(255,255,255,0.3);
  }
  .toggle-btn.active {
    background: #00ff00;
    color: #000;
  }
  .control-status {
    cursor: default;
    background: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>
  <div class="control-panel">
    <button class="toggle-btn" id="handControlToggle">🖐️ Hand Control: OFF</button>
    <div class="control-status" id="controlStatus">Regular</div>
  </div>
  <div id="game">
    <div class="hud-best">Best <span id="best">0</span></div>
    <div class="hud-score">
      <span id="score">0</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#ffca28"><path d="M12 2l2.9 6.9L22 10l-5.5 4.8L18.2 22 12 18.3 5.8 22l1.7-7.2L2 10l7.1-1.1L12 2z"/></svg>
    </div>
    <div id="scene"></div>
    <div id="water">
      <div class="wave back"></div>
      <div class="wave front"></div>
    </div>
    <div id="rocket">
      <svg width="44" height="60" viewBox="0 0 44 60">
        <!-- Tractor Beam (cone of light) -->
        <defs>
          <linearGradient id="beamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#00ff00;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#00ff00;stop-opacity:0" />
          </linearGradient>
        </defs>
        <polygon points="12,32 32,32 38,50 6,50" fill="url(#beamGradient)" />
        
        <!-- UFO Saucer (main disc) -->
        <ellipse cx="22" cy="28" rx="18" ry="6" fill="#4dd0e1" stroke="#00bcd4" stroke-width="1.5"/>
        <ellipse cx="22" cy="26" rx="18" ry="5" fill="#80deea" stroke="#00bcd4" stroke-width="1"/>
        
        <!-- UFO Dome (cockpit) -->
        <circle cx="22" cy="16" r="9" fill="#29b6f6" stroke="#0288d1" stroke-width="1.5"/>
        <circle cx="22" cy="14" r="8" fill="#64b5f6"/>
        
        <!-- Dome window -->
        <circle cx="22" cy="14" r="5" fill="#fff" opacity="0.4"/>
        <circle cx="22" cy="14" r="3" fill="#00ffff" opacity="0.7"/>
        
        <!-- Landing lights -->
        <circle cx="14" cy="28" r="2" fill="#ffff00"/>
        <circle cx="30" cy="28" r="2" fill="#ffff00"/>
        <circle cx="22" cy="30" r="1.5" fill="#ff00ff"/>
      </svg>
    </div>
    <div id="overlay">
      <h2>Splash!</h2>
      <div class="stats">
        <div>
          <div class="lbl">Score</div>
          <div class="val"><span id="finalScore">0</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffca28"><path d="M12 2l2.9 6.9L22 10l-5.5 4.8L18.2 22 12 18.3 5.8 22l1.7-7.2L2 10l7.1-1.1L12 2z"/></svg>
          </div>
        </div>
        <div>
          <div class="lbl">Best</div>
          <div class="val"><span id="finalBest">0</span></div>
        </div>
      </div>
      <div class="btns">
        <button class="btn-primary" id="restartBtn">Restart</button>
        <button class="btn-secondary" id="homeBtn">Home</button>
      </div>
    </div>
    <div id="handLostOverlay" style="display:none;position:absolute;inset:0;z-index:18;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;">
      <div style="font-size:48px">✋</div>
      <div style="font-size:18px;font-weight:700;text-align:center;padding:0 24px;">Please bring your hand into view</div>
    </div>
  </div>
  <canvas id="handCanvas"></canvas>
  <p class="hint">Move to aim · Click to drop · R / right-click to rotate · 🖐️ Pinch to grab &amp; move, twist wrist to rotate, spread to drop</p>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
(() => {
  const WIDTH = 420, HEIGHT = 760;
  const PLATFORM_Y = 560, PLATFORM_W = 180, WATER_Y = 620;
  const COLORS = ["#ef5350","#66bb6a","#42a5f5","#ffca28","#ab47bc","#ffa726","#ec407a","#26c6da","#9ccc65"];
  const KINDS = ["box","long","square","tri","lshape","circle","tall","wide"];

  const $ = id => document.getElementById(id);
  const scoreEl = $("score"), bestEl = $("best");
  const overlay = $("overlay"), rocketEl = $("rocket");
  const finalScore = $("finalScore"), finalBest = $("finalBest");
  const game = $("game"), scene = $("scene");
  const handCanvas = $("handCanvas");
  const handCtx = handCanvas.getContext("2d");
  const handControlToggle = $("handControlToggle");
  const controlStatus = $("controlStatus");

  let engine, render, runner;
  let active = null, locked = new Set();
  let state = "playing", score = 0;
  let best = parseInt(localStorage.getItem("stack-high") || "0", 10);
  let dropX = WIDTH / 2;
  let cameraY = 0; // Camera offset for scrolling
  let cameraVelocity = 0; // For smooth camera movement
  let platform, pillar, water; // Store body references for camera logic
  bestEl.textContent = best;

  // Hand control variables
  let hands = null;
  let camera = null;
  let isHandControlEnabled = false;
  let isHandControlActive = false;
  let handPinching = false;
  let handStartY = null;
  let pinchReleaseFrames = 0;
  let pinchHeldFrames = 0;
  let requiresSeparation = false;
  let previousHandAngle = null;
  let pinchAnchorHandX = null, pinchAnchorHandY = null;
  let pinchAnchorBlockX = null, pinchAnchorBlockY = null;
  let smoothX = null, smoothY = null, smoothAngle = null;
  const SMOOTH = 0.35;
  let handLost = false;
  let handMissingFrames = 0;
  const HAND_LOST_GRACE = 6; // frames before showing overlay
  
  const HAND_CONNECTIONS = [
    [0, 1], [1, 2], [2, 3], [3, 4],
    [0, 5], [5, 6], [6, 7], [7, 8],
    [0, 9], [9, 10], [10, 11], [11, 12],
    [0, 13], [13, 14], [14, 15], [15, 16],
    [0, 17], [17, 18], [18, 19], [19, 20],
    [5, 9], [9, 13], [13, 17]
  ];

  const rand = arr => arr[Math.floor(Math.random() * arr.length)];

  function makeShape(kind, x, y) {
    const color = kind === "rocket" ? "#FFD700" : rand(COLORS);
    const opts = {
      density: 0.2, friction: 0.95, frictionStatic: 1.5, restitution: 0,
      frictionAir: 0.02,
      render: { fillStyle: color }, chamfer: { radius: 6 }
    };
    switch(kind) {
      case "box": return Matter.Bodies.rectangle(x, y, 70, 32, opts);
      case "long": return Matter.Bodies.rectangle(x, y, 110, 22, opts);
      case "square": return Matter.Bodies.rectangle(x, y, 56, 56, opts);
      case "tri": return Matter.Bodies.polygon(x, y, 3, 42, {...opts, chamfer: {radius:4}});
      case "circle": return Matter.Bodies.circle(x, y, 28, {...opts, chamfer: {radius:2}});
      case "tall": return Matter.Bodies.rectangle(x, y, 40, 70, opts);
      case "wide": return Matter.Bodies.rectangle(x, y, 140, 28, opts);
      case "lshape": {
        const a = Matter.Bodies.rectangle(x-15, y, 56, 24, opts);
        const b = Matter.Bodies.rectangle(x+5, y+16, 24, 56, opts);
        return Matter.Body.create({ parts:[a,b], ...opts });
      }
    }
  }

  function spawn() {
    // Spawn at the top of the visible screen
    const spawnY = cameraY + 70;
    const body = makeShape(rand(KINDS), dropX, spawnY);
    Matter.Body.setStatic(body, true);
    active = body;
    Matter.Composite.add(engine.world, body);
  }

  function isHandPinching(landmarks) {
    const thumbTip = landmarks[4];
    const indexTip = landmarks[8];
    const pinchDistance = Math.sqrt(
      Math.pow(thumbTip.x - indexTip.x, 2) + 
      Math.pow(thumbTip.y - indexTip.y, 2)
    );
    return pinchDistance < 0.05;
  }

  function getPinchDistance(landmarks) {
    const thumbTip = landmarks[4];
    const indexTip = landmarks[8];
    const pinchDistance = Math.sqrt(
      Math.pow(thumbTip.x - indexTip.x, 2) + 
      Math.pow(thumbTip.y - indexTip.y, 2)
    );
    return pinchDistance;
  }

  function isIndexFingerPointing(landmarks) {
    // Check if only index finger is extended (for rotation gesture)
    const indexTip = landmarks[8];
    const indexBase = landmarks[5];
    const middleTip = landmarks[12];
    const middleBase = landmarks[9];
    const ringTip = landmarks[16];
    const ringBase = landmarks[13];
    const pinkyTip = landmarks[20];
    const pinkyBase = landmarks[17];

    const indexExtensionDist = Math.sqrt(
      Math.pow(indexTip.x - indexBase.x, 2) + 
      Math.pow(indexTip.y - indexBase.y, 2)
    );
    const middleExtensionDist = Math.sqrt(
      Math.pow(middleTip.x - middleBase.x, 2) + 
      Math.pow(middleTip.y - middleBase.y, 2)
    );
    const ringExtensionDist = Math.sqrt(
      Math.pow(ringTip.x - ringBase.x, 2) + 
      Math.pow(ringTip.y - ringBase.y, 2)
    );
    const pinkyExtensionDist = Math.sqrt(
      Math.pow(pinkyTip.x - pinkyBase.x, 2) + 
      Math.pow(pinkyTip.y - pinkyBase.y, 2)
    );

    // Index extended, others closed
    const indexExtended = indexTip.y < indexBase.y && indexExtensionDist > 0.08;
    const middleExtended = middleTip.y < middleBase.y && middleExtensionDist > 0.08;
    const ringExtended = ringTip.y < ringBase.y && ringExtensionDist > 0.08;
    const pinkyExtended = pinkyTip.y < pinkyBase.y && pinkyExtensionDist > 0.08;

    return indexExtended && !middleExtended && !ringExtended && !pinkyExtended;
  }

  function isOpenHand(landmarks) {
    const thumbTip = landmarks[4];
    const thumbBase = landmarks[2];
    const indexTip = landmarks[8];
    const indexBase = landmarks[5];
    const middleTip = landmarks[12];
    const middleBase = landmarks[9];
    const ringTip = landmarks[16];
    const ringBase = landmarks[13];
    const pinkyTip = landmarks[20];
    const pinkyBase = landmarks[17];

    const thumbExtensionDist = Math.sqrt(
      Math.pow(thumbTip.x - thumbBase.x, 2) + 
      Math.pow(thumbTip.y - thumbBase.y, 2)
    );
    const indexExtensionDist = Math.sqrt(
      Math.pow(indexTip.x - indexBase.x, 2) + 
      Math.pow(indexTip.y - indexBase.y, 2)
    );
    const middleExtensionDist = Math.sqrt(
      Math.pow(middleTip.x - middleBase.x, 2) + 
      Math.pow(middleTip.y - middleBase.y, 2)
    );
    const ringExtensionDist = Math.sqrt(
      Math.pow(ringTip.x - ringBase.x, 2) + 
      Math.pow(ringTip.y - ringBase.y, 2)
    );
    const pinkyExtensionDist = Math.sqrt(
      Math.pow(pinkyTip.x - pinkyBase.x, 2) + 
      Math.pow(pinkyTip.y - pinkyBase.y, 2)
    );

    const thumbExtended = thumbTip.y < thumbBase.y && thumbExtensionDist > 0.06;
    const indexExtended = indexTip.y < indexBase.y && indexExtensionDist > 0.08;
    const middleExtended = middleTip.y < middleBase.y && middleExtensionDist > 0.1;
    const ringExtended = ringTip.y < ringBase.y && ringExtensionDist > 0.08;
    const pinkyExtended = pinkyTip.y < pinkyBase.y && pinkyExtensionDist > 0.08;

    return thumbExtended && indexExtended && middleExtended && ringExtended && pinkyExtended;
  }

  function getHandAngle(landmarks) {
    const wrist = landmarks[0];
    const middleTip = landmarks[12];
    const deltaX = middleTip.x - wrist.x;
    const deltaY = middleTip.y - wrist.y;
    return Math.atan2(deltaY, deltaX);
  }

  function drawLandmark(x, y, color = '#00ff00', size = 5) {
    handCtx.fillStyle = color;
    handCtx.beginPath();
    handCtx.arc(x, y, size, 0, Math.PI * 2);
    handCtx.fill();
  }

  function drawConnection(x1, y1, x2, y2, color = '#00ff00', width = 2) {
    handCtx.strokeStyle = color;
    handCtx.lineWidth = width;
    handCtx.beginPath();
    handCtx.moveTo(x1, y1);
    handCtx.lineTo(x2, y2);
    handCtx.stroke();
  }

  function drawHandSkeleton(landmarks) {
    const points = landmarks.map(lm => ({
      x: lm.x * handCanvas.width,
      y: lm.y * handCanvas.height
    }));

    HAND_CONNECTIONS.forEach(([i, j]) => {
      const p1 = points[i];
      const p2 = points[j];
      drawConnection(p1.x, p1.y, p2.x, p2.y, '#00ffff', 3);
    });

    drawLandmark(points[0].x, points[0].y, '#ff0000', 8);
    [4, 8, 12, 16, 20].forEach((i, idx) => {
      drawLandmark(points[i].x, points[i].y, '#ffff00', 6);
    });

    for (let i = 1; i < 21; i++) {
      if (i !== 4 && i !== 8 && i !== 12 && i !== 16 && i !== 20) {
        drawLandmark(points[i].x, points[i].y, '#00ff00', 4);
      }
    }
  }

  function onHandResults(results) {
    handCtx.save();
    handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);

    if (results.image) {
      handCtx.translate(handCanvas.width, 0);
      handCtx.scale(-1, 1);
      handCtx.drawImage(results.image, 0, 0, handCanvas.width, handCanvas.height);
      handCtx.translate(handCanvas.width, 0);
      handCtx.scale(-1, 1);
    }

    const hlo = document.getElementById('handLostOverlay');
    const handVisible = !!(results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && isHandControlEnabled);

    if (!handVisible && isHandControlEnabled) {
      handMissingFrames++;
      // Show overlay only if we were pinching and hand has been gone long enough
      if (handPinching && handMissingFrames >= HAND_LOST_GRACE) {
        handLost = true;
        hlo.style.display = 'flex';
      }
      handCtx.restore();
      return;
    }

    // Hand is visible — clear any lost state
    handMissingFrames = 0;
    if (handLost) {
      handLost = false;
      hlo.style.display = 'none';
      // Re-anchor so block doesn't jump on return
      if (active && handPinching) {
        const landmarks = results.multiHandLandmarks[0];
        const mirrored = landmarks.map(lm => ({ ...lm, x: 1 - lm.x }));
        const wrist = mirrored[0];
        pinchAnchorHandX = wrist.x * WIDTH;
        pinchAnchorHandY = wrist.y * HEIGHT;
        pinchAnchorBlockX = active.position.x;
        pinchAnchorBlockY = active.position.y;
        smoothX = active.position.x;
        smoothY = active.position.y;
      }
    }

    const landmarks = results.multiHandLandmarks[0];
    const mirroredLandmarks = landmarks.map(lm => ({ ...lm, x: 1 - lm.x }));
    drawHandSkeleton(mirroredLandmarks);

    const pinchDistance = getPinchDistance(mirroredLandmarks);
    const isPinching = pinchDistance < 0.05;
    const isSeparated = pinchDistance > 0.15;

    if (isPinching && active && active.isStatic && state === "playing") {
      const wrist = mirroredLandmarks[0];
      const rawHandX = wrist.x * WIDTH;
      const rawHandY = wrist.y * HEIGHT;

      if (!handPinching) {
        handPinching = true;
        requiresSeparation = false;
        pinchReleaseFrames = 0;
        pinchHeldFrames = 0;
        previousHandAngle = getHandAngle(mirroredLandmarks);
        pinchAnchorHandX = rawHandX;
        pinchAnchorHandY = rawHandY;
        pinchAnchorBlockX = active.position.x;
        pinchAnchorBlockY = active.position.y;
        smoothX = active.position.x;
        smoothY = active.position.y;
        smoothAngle = active.angle;
      }
      pinchHeldFrames++;
      isHandControlActive = true;

      const dx = rawHandX - pinchAnchorHandX;
      const dy = rawHandY - pinchAnchorHandY;
      const targetX = Math.max(30, Math.min(WIDTH - 30, pinchAnchorBlockX + dx));
      const targetY = Math.max(cameraY + HEIGHT / 2, Math.min(PLATFORM_Y - 40, pinchAnchorBlockY + dy));

      smoothX = smoothX + (targetX - smoothX) * SMOOTH;
      smoothY = smoothY + (targetY - smoothY) * SMOOTH;
      Matter.Body.setPosition(active, { x: smoothX, y: smoothY });

      const rawAngle = getHandAngle(mirroredLandmarks);
      if (previousHandAngle !== null) {
        let angleDelta = rawAngle - previousHandAngle;
        if (angleDelta > Math.PI) angleDelta -= 2 * Math.PI;
        if (angleDelta < -Math.PI) angleDelta += 2 * Math.PI;
        smoothAngle = active.angle + angleDelta * 1.5;
        Matter.Body.setAngle(active, smoothAngle);
      }
      previousHandAngle = rawAngle;

      handCtx.fillStyle = 'rgba(255, 140, 0, 0.3)';
      handCtx.fillRect(0, 0, handCanvas.width, handCanvas.height);
    } else if (handPinching) {
      if (isSeparated && pinchHeldFrames >= 8) requiresSeparation = true;

      if (requiresSeparation) {
        if (active && active.isStatic && state === "playing") drop();
        handPinching = false;
        requiresSeparation = false;
        pinchReleaseFrames = 0;
        pinchHeldFrames = 0;
        pinchAnchorHandX = null; pinchAnchorHandY = null;
        pinchAnchorBlockX = null; pinchAnchorBlockY = null;
        smoothX = null; smoothY = null; smoothAngle = null;
      } else {
        pinchReleaseFrames++;
        if (pinchReleaseFrames > 30 && !isPinching) {
          handPinching = false;
          requiresSeparation = false;
          pinchReleaseFrames = 0;
        }
      }
      handStartY = null;
    }

    if (!isPinching && !handPinching) isHandControlActive = false;

    handCtx.restore();
  }

  async function initHands() {
    try {
      hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      hands.onResults(onHandResults);
      console.log('Hand detection initialized');
    } catch (error) {
      console.error('Hand init error:', error);
    }
  }

  async function startHandControl() {
    try {
      const videoElement = document.createElement('video');
      videoElement.width = 200;
      videoElement.height = 150;

      camera = new Camera(videoElement, {
        onFrame: async () => {
          if (isHandControlEnabled && hands) {
            await hands.send({ image: videoElement });
          }
        },
        width: 200,
        height: 150
      });

      await camera.start();

      // Setup hand canvas
      handCanvas.width = 200;
      handCanvas.height = 150;
      handCanvas.style.display = 'block';

      console.log('Hand control camera started');
    } catch (error) {
      console.error('Hand control camera error:', error);
      isHandControlEnabled = false;
      updateToggleButton();
    }
  }

  function stopHandControl() {
    if (camera) {
      camera.stop();
      camera = null;
    }
    handCanvas.style.display = 'none';
    handPinching = false;
    handStartY = null;
    isHandControlActive = false;
    handLost = false;
    handMissingFrames = 0;
    const hlo = document.getElementById('handLostOverlay');
    if (hlo) hlo.style.display = 'none';
  }

  function updateToggleButton() {
    if (isHandControlEnabled) {
      handControlToggle.classList.add('active');
      handControlToggle.textContent = '🖐️ Hand Control: ON';
      controlStatus.textContent = 'Hand Control';
    } else {
      handControlToggle.classList.remove('active');
      handControlToggle.textContent = '🖐️ Hand Control: OFF';
      controlStatus.textContent = 'Regular';
    }
  }

  handControlToggle.addEventListener('click', async (e) => {
    e.stopPropagation();
    isHandControlEnabled = !isHandControlEnabled;
    
    if (isHandControlEnabled) {
      if (!hands) await initHands();
      await startHandControl();
    } else {
      stopHandControl();
    }
    
    updateToggleButton();
  });

  // Initialize hand detection on load
  initHands();

  function init() {
    engine = Matter.Engine.create({ gravity: { x: 0, y: 1 } });
    render = Matter.Render.create({
      element: scene, engine,
      options: { width: WIDTH, height: HEIGHT, wireframes: false, background: "transparent", pixelRatio: window.devicePixelRatio || 1 }
    });
    runner = Matter.Runner.create();

    platform = Matter.Bodies.rectangle(WIDTH/2, PLATFORM_Y, PLATFORM_W, 16, {
      isStatic: true, friction: 1, chamfer: { radius: 4 }, render: { fillStyle: "#8a929c" }
    });
    pillar = Matter.Bodies.rectangle(WIDTH/2, PLATFORM_Y + 70, 60, 140, {
      isStatic: true, render: { fillStyle: "#a8b0bb" }
    });
    water = Matter.Bodies.rectangle(WIDTH/2, 720, WIDTH*2, 160, {
      isStatic: true, isSensor: true, label: "water", render: { visible: false }
    });
    Matter.Composite.add(engine.world, [platform, pillar, water]);

    Matter.Events.on(engine, "collisionStart", e => {
      for (const p of e.pairs) {
        const other = p.bodyA.label === "water" ? p.bodyB : p.bodyB.label === "water" ? p.bodyA : null;
        // Game over if any block (not platform/pillar/water) touches water
        if (other && other !== platform && other !== pillar && state === "playing") {
          gameOver();
        }
      }
    });

    Matter.Events.on(engine, "afterUpdate", () => {
      const bodies = Matter.Composite.allBodies(engine.world);
      for (const b of bodies) {
        if (b.isStatic || locked.has(b.id)) continue;
        const s = Math.hypot(b.velocity.x, b.velocity.y);
        const a = Math.abs(b.angularVelocity);
        if (s < 0.08 && a < 0.02 && b.position.y < WATER_Y) {
          b._still = (b._still || 0) + 1;
          if (b._still > 45) {
            Matter.Body.setStatic(b, true);
            locked.add(b.id);
          }
        } else b._still = 0;
      }
      
      // Update camera to follow only set blocks (static)
      let minY = PLATFORM_Y;
      for (const b of bodies) {
        if (b !== water && b !== platform && b !== pillar && b !== active && b.isStatic) {
          minY = Math.min(minY, b.position.y - 60);
        }
      }

      // Only start moving camera once tower reaches middle of screen
      let targetCameraY = 0;
      if (minY < HEIGHT / 2) {
        // Tower is reaching the middle, start scrolling up
        targetCameraY = minY - HEIGHT / 2;
      }
      cameraY += (targetCameraY - cameraY) * 0.08;
      cameraVelocity = 0;

      // Apply camera by shifting Matter.Render's bounds (this is what actually works)
      if (render) {
        render.bounds.min.x = 0;
        render.bounds.max.x = WIDTH;
        render.bounds.min.y = cameraY;
        render.bounds.max.y = cameraY + HEIGHT;
        render.options.hasBounds = true;
      }
      
      // Move the water/wave overlay down with the camera so it stays "at world y=720"
      // cameraY is <= 0 (negative when scrolled up), so we translate water by -cameraY px down
      const waterEl = document.getElementById('water');
      if (waterEl) {
        const rect = game.getBoundingClientRect();
        const sy = rect.height / HEIGHT;
        waterEl.style.transform = `translateY(${(-cameraY) * sy}px)`;
      }

      updateRocket();
    });

    Matter.Render.run(render);
    Matter.Runner.run(runner, engine);
    
    // Draw emojis on blocks
    const canvas = render.context.canvas;
    const ctx = render.context;
    
    Matter.Events.on(render, "afterRender", () => {
      const bodies = Matter.Composite.allBodies(engine.world);
      for (const b of bodies) {
        if (b.emoji) {
          const x = b.position.x - render.bounds.min.x;
          const y = b.position.y - render.bounds.min.y;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(b.angle);
          ctx.font = "32px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(b.emoji, 0, 0);
          ctx.restore();
        }
      }
    });
    
    spawn();
  }

  function updateRocket() {
    if (active && state === "playing") {
      const rect = game.getBoundingClientRect();
      const sx = rect.width / WIDTH, sy = rect.height / HEIGHT;
      rocketEl.style.left = (active.position.x * sx) + "px";
      rocketEl.style.top = (50 * sy) + "px";
      rocketEl.style.display = "block";
    } else {
      rocketEl.style.display = "none";
    }
  }

  function drop() {
    if (state !== "playing" || !active) return;
    const a = active;
    Matter.Body.setStatic(a, false);
    a.isStacked = true;
    active = null;
    handPinching = false;
    handStartY = null;
    isHandControlActive = false;
    rocketEl.style.display = "none";
    score++;
    scoreEl.textContent = score;
    const iv = setInterval(() => {
      if (state !== "playing") { clearInterval(iv); return; }
      const s = Math.hypot(a.velocity.x, a.velocity.y);
      if (s < 0.15 || locked.has(a.id)) {
        clearInterval(iv);
        if (state === "playing") spawn();
      }
    }, 100);
  }

  function rotate() {
    if (state !== "playing" || !active) return;
    Matter.Body.setAngle(active, active.angle + Math.PI / 2);
  }

  function gameOver() {
    state = "over";
    stopHandControl();
    if (score > best) {
      best = score;
      localStorage.setItem("stack-high", String(best));
    }
    bestEl.textContent = best;
    finalScore.textContent = score;
    finalBest.textContent = best;
    overlay.classList.add("show");
  }

  function restart() {
    const wasHandEnabled = isHandControlEnabled;
    // Only stop camera, don't toggle isHandControlEnabled
    if (camera) { camera.stop(); camera = null; }
    handCanvas.style.display = 'none';
    handPinching = false;
    handStartY = null;
    isHandControlActive = false;
    previousHandAngle = null;
    pinchHeldFrames = 0;
    pinchReleaseFrames = 0;

    Matter.Render.stop(render);
    Matter.Runner.stop(runner);
    render.canvas.remove();
    render.textures = {};
    Matter.World.clear(engine.world, false);
    Matter.Engine.clear(engine);
    locked.clear();
    active = null;
    state = "playing";
    score = 0;
    scoreEl.textContent = "0";
    cameraY = 0;
    cameraVelocity = 0;
    overlay.classList.remove("show");
    init();

    // Re-start camera if hand control was active
    if (wasHandEnabled) startHandControl();
  }

  function move(e) {
    if (isHandControlActive) return; // Don't allow mouse control during hand control
    
    const rect = game.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const x = ((cx - rect.left) / rect.width) * WIDTH;
    dropX = Math.max(30, Math.min(WIDTH - 30, x));
    if (active && active.isStatic && state === "playing") {
      Matter.Body.setPosition(active, { x: dropX, y: active.position.y });
    }
  }

  game.addEventListener("mousemove", move);
  game.addEventListener("touchmove", move, { passive: true });
  game.addEventListener("click", e => {
    if (e.target.closest("button")) return;
    drop();
  });
  game.addEventListener("contextmenu", e => { e.preventDefault(); rotate(); });
  window.addEventListener("keydown", e => {
    if (e.key === " " || e.key === "ArrowDown") { e.preventDefault(); drop(); }
    else if (e.key === "r" || e.key === "R" || e.key === "ArrowUp") rotate();
    else if (e.key === "ArrowLeft") { dropX = Math.max(30, dropX - 20); if (active && active.isStatic) Matter.Body.setPosition(active, {x:dropX,y:active.position.y}); }
    else if (e.key === "ArrowRight") { dropX = Math.min(WIDTH - 30, dropX + 20); if (active && active.isStatic) Matter.Body.setPosition(active, {x:dropX,y:active.position.y}); }
  });
  $("restartBtn").addEventListener("click", e => { e.stopPropagation(); restart(); });
  $("homeBtn").addEventListener("click", e => { e.stopPropagation(); restart(); });

  init();
})();
</script>
</body>
</html>
